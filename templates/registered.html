{% extends 'base.html' %}
{% block content %}
    <br>
    <div class="container">
        <div class="jumbotron">
            <div class="card card-body">
                {% if registered %}
                    <h1>Thankyou for Registration...!!!!</h1>
                    <p>Please proceed to <a href="#">Login</a></p>
                {% else %}

                    <h1>Registration Form</h1>
                    <form enctype="multipart/form-data" method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        {{ form1.as_p }}
                        <input type="submit" class="btn btn-primary" value="REGISTER">
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
    
{% endblock %}
