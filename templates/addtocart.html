{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Add to Cart</h2>
    <form method="POST" class="p-4 border rounded shadow-sm bg-light w-50">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label for="productDropdown" class="form-label"><strong>Product Name:</strong></label>
            <select class="form-control" id="productDropdown" name="product">
                {% for item in available_products %}
                    <option value="{{ item.id }}">{{ item.product_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group mb-4">
            <label for="quantityInput" class="form-label"><strong>Quantity:</strong></label>
            <input type="number" class="form-control" id="quantityInput" name="quantity" min="1" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Add</button>
    </form>
</div>
{% endblock %}
